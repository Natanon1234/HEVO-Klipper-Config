[include moonraker_obico_macros.cfg]
# This file contains common pin mappings for the BigTreeTech SKR 3.
# To use this config, the firmware should be compiled for the
# STM32H743 with a "128KiB bootloader".

# See docs/Config_Reference.md for a description of parameters.
#Mainsail
[include mainsail.cfg]
[include Adaptive_Mesh.cfg]

[bltouch]
sensor_pin: ~PC13
control_pin: PE5
pin_up_touch_mode_reports_triggered: False
probe_with_touch_mode: False
x_offset: 25.0
y_offset: 13.0
z_offset = 3
samples: 3
samples_result: median
sample_retract_dist: 5.0
samples_tolerance: 0.05
samples_tolerance_retries: 10

# [axis_twist_compensation]
# #speed: 50
# #   The speed (in mm/s) of non-probing moves during the calibration.
# #   The default is 50.
# #horizontal_move_z: 5
# #   The height (in mm) that the head should be commanded to move to
# #   just prior to starting a probe operation. The default is 5.
# calibrate_start_x: 25
# #   Defines the minimum X coordinate of the calibration
# #   This should be the X coordinate that positions the nozzle at the starting
# #   calibration position. This parameter must be provided.
# calibrate_end_x: 280
# #   Defines the maximum X coordinate of the calibration
# #   This should be the X coordinate that positions the nozzle at the ending
# #   calibration position. This parameter must be provided.
# calibrate_y: 150
# #   Defines the Y coordinate of the calibration
# #   This should be the Y coordinate that positions the nozzle during the
# #   calibration process. This parameter must be provided and is recommended to
# #   be near the center of the bed

[force_move] 
enable_force_move: true

[bed_mesh]
speed: 200
horizontal_move_z: 5
mesh_min: 35, 20
mesh_max: 285, 285
probe_count: 6,6
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0
adaptive_margin: 5

[stepper_y]
step_pin: PD4
dir_pin: PD3
enable_pin: !PD6
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_max: 300
homing_speed: 100
second_homing_speed: 10

[stepper_x]
step_pin: PA15
dir_pin: PA8
enable_pin: !PD1
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC3
position_endstop: 0
position_max: 290
homing_speed: 100
second_homing_speed: 10

[stepper_z]
step_pin: PE2
dir_pin: PE3
enable_pin: !PE0
microsteps: 16
rotation_distance: 8
endstop_pin:probe:z_virtual_endstop
position_max: 300
homing_speed:15
homing_retract_dist: 5.0
position_min:-5.0
second_homing_speed:8

[safe_z_home]
home_xy_position: 5, 5 # Change coordinates to the center of your print bed
speed: 50
z_hop: 10                 # Move up 10mm
z_hop_speed: 15

[extruder]
step_pin: PD15
dir_pin: PD14
enable_pin: !PC7
microsteps: 16
rotation_distance: 7.3048
nozzle_diameter: 0.500
filament_diameter: 1.750
heater_pin: PB3
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA2
control: pid
pid_Kp=35.429 
pid_Ki=2.567 
pid_Kd=122.231
min_temp: 0
max_temp: 270
max_extrude_only_distance:150
max_extrude_cross_section: 120
max_extrude_only_distance: 1000

[filament_switch_sensor switch_sensor]
switch_pin: ^PA0
pause_on_runout: True
runout_gcode:
  PAUSE # [pause_resume] is required in your printer.cfg
  M117 Filament runout detected (Switch)
insert_gcode:
  M117 Filament inserted

[filament_motion_sensor encoder_sensor]
switch_pin: ^PC2
detection_length: 2.88 # The hardware precision of the SFS V2.0 encoder wheel
extruder: extruder
pause_on_runout: True
runout_gcode:
  PAUSE
  M117 Filament jam/clog detected (Encoder)
insert_gcode:
  M117 Filament motion restored

#[extruder1]
#step_pin: PD11
#dir_pin: PD10
#enable_pin: !PD13
#heater_pin: PB4
#sensor_pin: PA3
#...

[heater_bed]
heater_pin: PD7
sensor_type: Generic 3950
sensor_pin: PA1
control: pid
pid_Kp=74.744
pid_Ki=1.350
pid_Kd=1034.270
min_temp: 0
max_temp: 100

[bed_screws]
screw1: 0, 0
screw2: 280, 0
screw3: 280, 300
screw4: 0, 300

[screws_tilt_adjust]
screw1: 0, 0
screw1_name: front left screw
screw2: 265, 0
screw2_name: front right screw
screw3: 265, 285
screw3_name: rear right screw
screw4: 0, 285
screw4_name: rear left screw
horizontal_move_z: 10.
speed: 50.
screw_thread: CW-M3

[fan]
pin: PB7

[heater_fan fan1]
pin: PB5

#[heater_fan fan2]
#pin: PB5

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h743xx_41002D000851303137353839-if00

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 10000
max_z_velocity: 30
max_z_accel: 2000

[mcu rpi]
serial: /tmp/klipper_host_mcu

[adxl345]
cs_pin: rpi:None

[resonance_tester]
accel_chip: adxl345
probe_points:
    150, 150, 20  # an example

[respond]
default_type: echo
#   Sets the default prefix of the "M118" and "RESPOND" output to one
#   of the following:
#       echo: "echo: " (This is the default)
#       command: "// "
#       error: "!! "
#default_prefix: echo:
#   Directly sets the default prefix. If present, this value will
#   override the "default_type".

########################################
# EXP1 / EXP2 (display) pins
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PC5, EXP1_3=PB1, EXP1_5=PE9,  EXP1_7=PE11, EXP1_9=<GND>,
    EXP1_2=PB0, EXP1_4=PE8, EXP1_6=PE10, EXP1_8=PE12, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=PA6, EXP2_3=PE7, EXP2_5=PB2, EXP2_7=PC4,   EXP2_9=<GND>,
    EXP2_2=PA5, EXP2_4=PA4, EXP2_6=PA7, EXP2_8=<RST>, EXP2_10=<NC>

# See the sample-lcd.cfg file for definitions of common LCD displays.

########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_x]
uart_pin: PD5
run_current: 0.800
#diag_pin:

[tmc2209 stepper_y]
uart_pin: PD0
run_current: 0.800
#diag_pin:

[tmc2209 stepper_z]
uart_pin: PE1
run_current: 0.55
#diag_pin:

[tmc2209 extruder]
uart_pin: PC6
run_current: 0.650
#diag_pin:

#[tmc2209 extruder1]
#uart_pin: PD12
#run_current: 0.600
#diag_pin

[neopixel my_neopixel]
pin: PE6
#   The pin connected to the neopixel. This parameter must be
#   provided.
chain_count: 25
#   The number of Neopixel chips that are "daisy chained" to the
#   provided pin. The default is 1 (which indicates only a single
#   Neopixel is connected to the pin).
#color_order: GRB
#   Set the pixel order required by the LED hardware. Options are GRB,
#   RGB, GRBW, or RGBW. The default is GRB.
#initial_RED: 0.0
#initial_GREEN: 0.0
#initial_BLUE: 0.0
#initial_WHITE: 0.0
#   Sets the initial LED color of the Neopixel. Each value should be
#   between 0.0 and 1.0. The WHITE option is only available on RGBW
#   LEDs. The default for each color is 0.

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 20
max_temp: 90

[exclude_object]

######################################################################
# Filament Change
######################################################################

# M600: Filament Change. This macro will pause the printer, move the
# tool to the change position, and retract the filament 50mm. Adjust
# the retraction settings for your own extruder. After filament has
# been changed, the print can be resumed from its previous position
# with the "RESUME" gcode.

[pause_resume]

[gcode_macro M600]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state


[gcode_macro LOAD_FILAMENT]
#
# LOAD_FILAMENT
#
# Heat to 200°C then prime the nozzle
description: Load filament (heat nozzle if necessary)
gcode:
   M117 Loading filament...
   {% if printer[printer.toolhead.extruder].temperature < 200.0 %}
   M117 Heating hotend...
   SET_HEATER_TEMPERATURE HEATER='extruder' TARGET=240
   TEMPERATURE_WAIT SENSOR='extruder' MINIMUM=230
   {%endif%}
   M117 Loading filament...
   M83                            ; set extruder to relative
   G1 E100 F300                   ; slower extrusion for extruder path
   G1 E700 F4000                  ; extrusion for Bowden path
   G1 E50 F150                    ; prime nozzle with filament
   M82                            ; set extruder to absolute

[gcode_macro UNLOAD_FILAMENT]
#
# UNLOAD_FILAMENT
#
# Heat the nozzle to 230°C then retract the filament out of the toolhead
#
description: Heat the nozzle (if needed), then retract the filament out of the toolhead
gcode:
  {% if printer[printer.toolhead.extruder].temperature < 230.0 %}
    M117 Heating hotend...
    SET_HEATER_TEMPERATURE HEATER='extruder' TARGET=230
    TEMPERATURE_WAIT SENSOR='extruder' MINIMUM=230
  {% endif %}
  M117 Unloading filament...
  M83                            ; set extruder to relative
  G1 E10 F300                    ; extrude a little to soften tip
  G1 E-80 F1800                 ; retract filament completely
  G1 E-800 F3000
  M82                            ; set extruder to absolute

[gcode_macro LIGHT_ON]
description: Turns on RGB LEDs to white
gcode: SET_LED LED=my_neopixel RED=1 GREEN=1 BLUE=1

[gcode_macro LIGHT_OFF]
description: Turns on RGB LEDs to white
gcode: SET_LED LED=my_neopixel RED=0 GREEN=0 BLUE=0

[gcode_macro _POWER_OFF_PRINTER]
gcode:
 {action_call_remote_method("set_device_power",
                             device="printer",
                             state="off")}

[gcode_macro SET_ACTIVE_SPOOL]
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {action_call_remote_method(
       "spoolman_set_active_spool",
       spool_id=id
    )}
  {% else %}
    {action_respond_info("Parameter 'ID' is required")}
  {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
  {action_call_remote_method(
    "spoolman_set_active_spool",
    spool_id=None
  )}


[delayed_gcode POWER_OFF_PRINTER_CHECK]
gcode:
  {% if printer.idle_timeout.state == "Idle" or printer.idle_timeout.state == "Ready" %}
    {% if printer.extruder.temperature < 50.0 and printer.heater_bed.temperature < 50.0 %}
        {% if printer.extruder.target == 0.0 and printer.heater_bed.target == 0.0 %}
            UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=0
            _POWER_OFF_PRINTER
        {% else %}
            UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=2
        {% endif %}
    {% else %}
        {% if printer.idle_timeout.state == "Printing" %}
            UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=0
        {% else %}
            {% if printer.extruder.target == 0.0 and printer.heater_bed.target == 0.0 %}
                UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=2
            {% else %}
                UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=0
            {% endif %}
        {% endif %}
    {% endif %}
  {% endif %}

